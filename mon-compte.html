<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon compte — StudyShare</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-logo">StudyShare</a>
      <nav class="site-nav">
        <a href="index.html">Accueil</a>
        <a href="fichiers.html">Fichiers</a>
        <a href="televerser.html">Téléverser</a>
        <a href="portefeuille.html">Portefeuille</a>
        <a href="mon-compte.html" class="active">Mon compte</a>
        <a href="collections.html">Collections</a>
        <a href="connexion.html">Connexion</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container" style="max-width: 560px;">
      <h1>Mon compte</h1>
      <p class="text-muted mb-2">Gérez vos informations personnelles.</p>

      <div id="alert-container"></div>

      <form id="form-compte" class="card" method="post" action="#" novalidate>
        <div class="form-group">
          <label for="nom">Nom</label>
          <input type="text" id="nom" name="nom" required maxlength="100" value="" placeholder="Chargement…">
          <span class="form-error" role="alert"></span>
        </div>
        <div class="form-group">
          <label for="email">Courriel</label>
          <input type="email" id="email" name="email" required value="" placeholder="Chargement…">
          <span class="form-error" role="alert"></span>
        </div>
        <div class="form-group">
          <label for="universite">Université</label>
          <input type="text" id="universite" name="universite" value="" placeholder="Chargement…" readonly>
          <span class="form-error" role="alert"></span>
        </div>
        <div class="form-group mt-2">
          <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
        </div>
      </form>

      <section class="card mt-2">
        <h2>Changer le mot de passe</h2>
        <form id="form-password" novalidate>
          <div class="form-group">
            <label for="current_password">Mot de passe actuel</label>
            <input type="password" id="current_password" name="current_password" required>
            <span class="form-error" role="alert"></span>
          </div>
          <div class="form-group">
            <label for="new_password">Nouveau mot de passe</label>
            <input type="password" id="new_password" name="new_password" required>
            <span class="form-help">Minimum 8 caractères.</span>
            <span class="form-error" role="alert"></span>
          </div>
          <div class="form-group">
            <label for="new_password_confirm">Confirmer le nouveau mot de passe</label>
            <input type="password" id="new_password_confirm" name="new_password_confirm" required>
            <span class="form-error" role="alert"></span>
          </div>
          <button type="submit" class="btn btn-secondary">Changer le mot de passe</button>
        </form>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>© StudyShare</span>
      <a href="portefeuille.html">Portefeuille</a>
      <a href="fichiers.html">Fichiers</a>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      'use strict';
      var formCompte = document.getElementById('form-compte');
      var formPassword = document.getElementById('form-password');
      var alertContainer = document.getElementById('alert-container');

      if (!window.StudyShare || !window.StudyShare.validation) return;
      var v = window.StudyShare.validation;

      /* Chargement des données réelles depuis le serveur */
      fetch('/api/mon-compte', { credentials: 'include' })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (!data || data.status !== 'success') {
            window.StudyShare.showAlert('Connectez-vous pour accéder à votre compte.', 'info', alertContainer);
            return;
          }
          var u = data.user;
          var nomEl = document.getElementById('nom');
          var emailEl = document.getElementById('email');
          var univEl = document.getElementById('universite');
          if (nomEl) nomEl.value = u.nom || '';
          if (emailEl) emailEl.value = u.courriel || '';
          if (univEl) univEl.value = u.nom_universite || '';
        })
        .catch(function () {
          window.StudyShare.showAlert('Impossible de charger les informations du compte.', 'error', alertContainer);
        });

      if (formCompte) {
        formCompte.addEventListener('submit', function (e) {
          e.preventDefault();
          window.StudyShare.clearFormErrors(formCompte);
          while (alertContainer.firstChild) alertContainer.removeChild(alertContainer.firstChild);
          var nomR = v.validateNom(formCompte.querySelector('#nom').value);
          var emailR = v.validateEmail(formCompte.querySelector('#email').value);
          var univR = v.validateUniversite(formCompte.querySelector('#universite').value);
          var hasError = false;
          if (!nomR.valid) { window.StudyShare.setFieldError(formCompte.querySelector('#nom'), nomR.message); hasError = true; }
          if (!emailR.valid) { window.StudyShare.setFieldError(formCompte.querySelector('#email'), emailR.message); hasError = true; }
          if (!univR.valid) { window.StudyShare.setFieldError(formCompte.querySelector('#universite'), univR.message); hasError = true; }
          if (hasError) {
            var d = document.createElement('div');
            d.className = 'alert alert-error';
            d.textContent = 'Veuillez corriger les erreurs.';
            alertContainer.appendChild(d);
            return;
          }
          window.StudyShare.showAlert('Profil enregistré.', 'success', alertContainer);
        });
      }

      if (formPassword) {
        formPassword.addEventListener('submit', function (e) {
          e.preventDefault();
          window.StudyShare.clearFormErrors(formPassword);
          while (alertContainer.firstChild) alertContainer.removeChild(alertContainer.firstChild);

          var currentPwd = formPassword.querySelector('#current_password').value;
          var newPwd = formPassword.querySelector('#new_password').value;
          var confirmPwd = formPassword.querySelector('#new_password_confirm').value;

          if (!currentPwd) {
            window.StudyShare.setFieldError(formPassword.querySelector('#current_password'), 'Saisissez votre mot de passe actuel.');
            return;
          }

          var result = v.validatePassword(newPwd, confirmPwd);
          if (!result.valid) {
            window.StudyShare.setFieldError(formPassword.querySelector('#new_password'), result.message);
            window.StudyShare.setFieldError(formPassword.querySelector('#new_password_confirm'), result.message);
            return;
          }

          fetch('/api/changer-mot-de-passe', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ancien_password: currentPwd, nouveau_password: newPwd })
          })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.status === 'success') {
              window.StudyShare.showAlert(data.message || 'Mot de passe modifié.', 'success', alertContainer);
              formPassword.reset();
            } else {
              window.StudyShare.showAlert(data.message || 'Erreur lors du changement.', 'error', alertContainer);
            }
          })
          .catch(function () {
            window.StudyShare.showAlert('Erreur réseau. Réessayez.', 'error', alertContainer);
          });
        });
      }
    })();
  </script>
</body>
</html>
