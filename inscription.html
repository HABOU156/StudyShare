<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — StudyShare</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-logo">StudyShare</a>
      <nav class="site-nav">
        <a href="index.html">Accueil</a>
        <a href="fichiers.html">Fichiers</a>
        <a href="connexion.html">Connexion</a>
        <a href="inscription.html" class="active">Inscription</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container" style="max-width: 480px;">
      <h1>Inscription</h1>
      <p class="text-muted mb-2">Créez un compte étudiant pour consulter, téléverser et noter des documents.</p>

      <form id="form-inscription" class="card" method="post" action="#" novalidate>
        <div id="alert-container"></div>

        <div class="form-group">
          <label for="nom">Nom</label>
          <input type="text" id="nom" name="nom" required autocomplete="name" placeholder="Votre nom">
          <span class="form-error" role="alert" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="email">Courriel</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="vous@universite.ca">
          <span class="form-error" role="alert" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="universite">Université</label>
          <input type="text" id="universite" name="universite" required placeholder="Nom de votre université">
          <span class="form-error" role="alert" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="••••••••">
          <span class="form-help">Minimum 8 caractères.</span>
          <span class="form-error" role="alert" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="password_confirm">Confirmer le mot de passe</label>
          <input type="password" id="password_confirm" name="password_confirm" required autocomplete="new-password" placeholder="••••••••">
          <span class="form-error" role="alert" aria-live="polite"></span>
        </div>

        <div class="form-group mt-2">
          <button type="submit" class="btn btn-primary" id="btn-submit">S'inscrire</button>
        </div>
      </form>

      <p class="text-center mt-2">
        Déjà inscrit ? <a href="connexion.html">Se connecter</a>
      </p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>© StudyShare</span>
      <a href="index.html">Accueil</a>
      <a href="connexion.html">Connexion</a>
    </div>
  </footer>

  <script src="js/validation.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      'use strict';
      var form = document.getElementById('form-inscription');
      var alertContainer = document.getElementById('alert-container');
      var btnSubmit = document.getElementById('btn-submit');

      if (!form) return;

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        if (!window.StudyShare || !window.StudyShare.validation) return;
        var v = window.StudyShare.validation;
        var nomEl = form.querySelector('#nom');
        var emailEl = form.querySelector('#email');
        var universiteEl = form.querySelector('#universite');
        var passwordEl = form.querySelector('#password');
        var passwordConfirmEl = form.querySelector('#password_confirm');

        window.StudyShare.clearFormErrors(form);
        while (alertContainer.firstChild) alertContainer.removeChild(alertContainer.firstChild);

        var nomResult = v.validateNom(nomEl ? nomEl.value : '');
        var emailResult = v.validateEmail(emailEl ? emailEl.value : '');
        var universiteResult = v.validateUniversite(universiteEl ? universiteEl.value : '');
        var passwordResult = v.validatePassword(
          passwordEl ? passwordEl.value : '',
          passwordConfirmEl ? passwordConfirmEl.value : undefined
        );

        var hasError = false;
        if (!nomResult.valid) { window.StudyShare.setFieldError(nomEl, nomResult.message); hasError = true; }
        if (!emailResult.valid) { window.StudyShare.setFieldError(emailEl, emailResult.message); hasError = true; }
        if (!universiteResult.valid) { window.StudyShare.setFieldError(universiteEl, universiteResult.message); hasError = true; }
        if (!passwordResult.valid) {
          window.StudyShare.setFieldError(passwordEl, passwordResult.message);
          if (passwordConfirmEl) window.StudyShare.setFieldError(passwordConfirmEl, passwordResult.message);
          hasError = true;
        }

        if (hasError) {
          var alertDiv = document.createElement('div');
          alertDiv.className = 'alert alert-error';
          alertDiv.setAttribute('role', 'alert');
          alertDiv.textContent = 'Veuillez corriger les erreurs ci-dessous.';
          alertContainer.appendChild(alertDiv);
          return;
        }

        btnSubmit.disabled = true;
        try {
          window.StudyShare.showAlert('Inscription réussie. Redirection…', 'success', alertContainer);
          setTimeout(function () {
            window.location.href = 'connexion.html';
          }, 1500);
        } catch (err) {
          window.StudyShare.showAlert('Une erreur est survenue. Réessayez.', 'error', alertContainer);
          btnSubmit.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
