<script>
    (function () {
      'use strict';

      /* ── Éléments DOM ── */
      var form           = document.getElementById('form-review');
      var alertContainer = document.getElementById('alert-container');
      var noteEl         = form && form.querySelector('#review-note');
      var titreEl        = form && form.querySelector('#review-titre');
      var commentEl      = form && form.querySelector('#review-comment');
      var badgeType      = document.getElementById('badge-type');
      var docTitle       = document.getElementById('doc-title');
      var docCours       = document.getElementById('doc-cours');
      var docDate        = document.getElementById('doc-date');
      var docNote        = document.getElementById('doc-note');
      var btnDownload    = document.getElementById('btn-download');
      var reviewsList    = document.getElementById('reviews-list');

      var params  = new URLSearchParams(window.location.search);
      var fileId  = params.get('id') || '';

      /* État global de session */
      var sessionUser = null; 

      var typeClass = {
        'Cours':     'file-type-cours',
        'Résumé':    'file-type-resume',
        'Examen':    'file-type-examen',
        'Exercices': 'file-type-exercices'
      };

      /* ── Utilitaires ── */
      function formatDate(str) {
        if (!str) return '—';
        var d = new Date(str);
        return isNaN(d.getTime()) ? str : d.toLocaleDateString('fr-CA');
      }

      function extensionDepuisLien(lien) {
        if (!lien) return '';
        var clean = String(lien).split('?')[0];
        var idx = clean.lastIndexOf('.');
        return idx >= 0 ? clean.slice(idx + 1).toLowerCase() : '';
      }

      function escapeHtml(text) {
        if (text == null) return '';
        var div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
      }

      function showAlert(message, type) {
        while (alertContainer.firstChild) alertContainer.removeChild(alertContainer.firstChild);
        if (window.StudyShare && window.StudyShare.showAlert) {
          window.StudyShare.showAlert(message, type, alertContainer);
        }
      }

      /* ── Vérification de session ── */
      function verifierSession() {
        return fetch('/api/session-check', { credentials: 'include' })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            sessionUser = data; 
            return data;
          })
          .catch(function () {
            sessionUser = { logged_in: false };
            return sessionUser;
          });
      }

      /* ── Chargement du fichier ── */
      function chargerFichier() {
        if (!window.StudyShareApi || !fileId) {
          if (docTitle) docTitle.textContent = 'Paramètre id manquant';
          return;
        }

        window.StudyShareApi.getFichier(fileId)
          .then(function (data) {
            var f = data && data.fichier;
            if (!f) {
              if (docTitle) docTitle.textContent = 'Document introuvable';
              return;
            }

            var mapped = window.StudyShareApi.mapFichierPourUi(f);

            if (badgeType) {
              badgeType.textContent = f.type || '';
              badgeType.className = 'file-type-badge ' + (typeClass[f.type] || '');
            }
            if (docTitle) docTitle.textContent = mapped.titre;
            if (docCours) docCours.textContent = mapped.cours;
            if (docDate)  docDate.textContent  = formatDate(mapped.date);

            if (btnDownload) {
              btnDownload.disabled = !sessionUser || !sessionUser.logged_in;
            }

            renderPreview(f);
          })
          .catch(function () {
            if (docTitle) docTitle.textContent = 'Document introuvable';
            showAlert('Impossible de charger ce fichier.', 'error');
          });
      }

      /* ── Avis et Moyenne ── */
      function renderMoyenne(moyenne, totalAvis) {
        if (!docNote) return;
        var m = Number(moyenne || 0);
        var total = Number(totalAvis || 0);
        if (m > 0 && total > 0) {
          var stars = '★'.repeat(Math.round(m)) + '☆'.repeat(5 - Math.round(m));
          docNote.textContent = stars + ' (' + m.toFixed(1) + '/5, ' + total + ' avis)';
        } else {
          docNote.textContent = 'Pas encore noté';
        }
      }

      function chargerAvis() {
        if (!window.StudyShareApi || !fileId) return;
        fetch('/api/fichiers/' + encodeURIComponent(fileId) + '/reviews', { credentials: 'include' })
          .then(function (res) { return res.json(); })
          .then(function (res) {
            var data = res && res.data ? res.data : {};
            renderMoyenne(data.moyenne || 0, data.total_avis || 0);
            
            if (!reviewsList) return;
            var reviews = data.reviews || [];
            if (reviews.length === 0) {
              reviewsList.innerHTML = '<p class="text-muted card-meta">Aucun avis pour le moment.</p>';
              return;
            }

            reviewsList.innerHTML = reviews.map(function (r) {
              var note = Number(r.note || 0);
              var stars = note > 0 ? ('★'.repeat(note) + '☆'.repeat(5 - note)) : '—';
              return '<article class="card mb-2" style="border-bottom:1px solid #eee;">' +
                '<p class="stars" style="margin:0">' + stars + '</p>' +
                '<h3 class="card-title" style="font-size:1.1rem">' + escapeHtml(r.titre || 'Avis') + '</h3>' +
                '<p class="card-meta">' + escapeHtml(r.commentaire || '') + '</p>' +
                '<p class="text-muted" style="font-size:12px">' + escapeHtml(r.nom || 'Utilisateur') + ' — ' + formatDate(r.date_de_mise_enligne) + '</p>' +
                '</article>';
            }).join('');
          });
      }

      /* ── Aperçu ── */
      function renderPreview(fichier) {
        var container = document.getElementById('preview-container');
        if (!container || !window.StudyShareApi) return;

        var previewUrl = window.StudyShareApi.previewUrlPourFid(fileId);
        var ext = extensionDepuisLien(fichier && fichier.lien_access);

        if (!sessionUser || !sessionUser.logged_in) {
          container.innerHTML = '<p class="text-muted">Connectez-vous pour voir l\'aperçu.</p>';
          return;
        }

        if (ext === 'pdf') {
          container.innerHTML = '<iframe src="' + previewUrl + '" style="width:100%;height:520px;border:1px solid #ddd;border-radius:8px;"></iframe>';
        } else if (['png', 'jpg', 'jpeg', 'gif', 'webp'].indexOf(ext) !== -1) {
          container.innerHTML = '<img src="' + previewUrl + '" style="max-width:100%;height:auto;border:1px solid #ddd;border-radius:8px;">';
        } else {
          container.innerHTML = '<p class="text-muted">Aperçu non supporté pour .' + ext + '</p>';
        }
      }

      /* ── Téléchargement ── */
      function gererTelecharger() {
        verifierSession().then(function (session) {
          if (!session.logged_in) {
            showAlert('Connectez-vous pour télécharger.', 'error');
            return;
          }
          var downloadUrl = window.StudyShareApi.downloadUrlPourFid(fileId);
          fetch(downloadUrl, { credentials: 'include' })
            .then(function (res) {
              if (!res.ok) throw new Error('Erreur quota ou accès.');
              return res.blob();
            })
            .then(function (blob) {
              var url = URL.createObjectURL(blob);
              var a = document.createElement('a');
              a.href = url;
              a.download = 'document';
              a.click();
              URL.revokeObjectURL(url);
            })
            .catch(function (err) { showAlert(err.message, 'error'); });
        });
      }

      /* ── Formulaire d'avis ── */
      function initialiserFormReview() {
        if (!form) return;
        form.addEventListener('submit', function (e) {
          e.preventDefault();
          verifierSession().then(function (session) {
            if (!session.logged_in) {
              showAlert('Connectez-vous pour publier un avis.', 'error');
              return;
            }

            var v = window.StudyShare.validation;
            var noteVal = noteEl.value;
            var titreVal = titreEl.value.trim();
            var commVal = commentEl.value.trim();

            window.StudyShareApi.postReview({
              eid: session.user_id,
              fid: parseInt(fileId, 10),
              note: parseInt(noteVal, 10),
              titre: titreVal,
              commentaire: commVal
            })
            .then(function () {
              showAlert('Avis enregistré.', 'success');
              form.reset();
              chargerAvis();
            })
            .catch(function (err) { showAlert(err.message, 'error'); });
          });
        });
      }

      /* ── Lancement ── */
      if (btnDownload) btnDownload.addEventListener('click', gererTelecharger);
      initialiserFormReview();

      verifierSession().then(function () {
        chargerFichier();
        chargerAvis();
      });

    })();
  </script>
